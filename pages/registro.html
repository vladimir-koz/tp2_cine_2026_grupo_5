<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine Aurora 📽️ - Registro</title>
  <meta name="description" content="Cine Aurora - Registro" />
  <link rel="icon" href="../assets/favicon/logo-cine.png" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <header class="site-header">
    <div class="site-header__brand">
      <a href="/">
        <h1 class="site-header__title">Cine Aurora</h1>
        <img class="site-header__logo" src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" />
      </a>
    </div>
    <nav class="site-nav" aria-label="Navegación principal">
      <a class="site-nav__link" href="../index.html">Inicio</a>
      <a class="site-nav__link" href="../pages/estrenos.html">Próximos estrenos</a>
      <a class="site-nav__link" href="../pages/perfil.html">Mi perfil</a>
      <a class="site-nav__link site-nav__link--active" href="../pages/login.html">Login</a>
    </nav>
  </header>

  <main class="container">
    <div class="main__section">
      <form action="login.html">
        <h2>Crear nueva cuenta</h2>
        
        <div class="form__input-container">
          <label>Nombre Completo</label>
          <input class="form__input" type="text" required />
        </div>

        <div class="form__input-container">
          <label>Email</label>
          <input class="form__input" type="email" required />
        </div>

        <div class="form__input-container">
          <label>Fecha de nacimiento</label>
          <input class="" type="date" required />
        </div>

        <div class="form__input-container"> 
          <label>Contraseña</label>
          <input class="form__input" type="password" required />
        </div>

        <div class="form__input-container">
          <label>Confirmar contraseña</label>
          <input class="form__input" type="password" required />
        </div>

        <hr />

        <div>
          <div class="second-form__container">
            <h3>Datos para ayudar al cine</h3>
            <small>Estos datos nos ayudan a mejorar tu experiencia.</small>
          </div>

          <div>
            <div class="form__input-container">
              <label>Elegí tu color favorito para las butacas</label>
              <input type="color" />
            </div>

            <div class="form__input-container">
              <label>¿Cuántas entradas comprás en general? Min: 0 | Max: 10</label>
              <input type="range" min="0" max="10" />
            </div>

            <div class="form__input-container">
              <label>Seleccioná tu género favorito</label>
              <select>
                <option>Acción</option>
                <option>Drama</option>
                <option>Ciencia ficción</option>
                <option>Terror</option>
                <option>Comedia</option>
                <option>Romance</option>
              </select>
            </div>

            <div>
              <label>Elegí tu snack favorito</label>
              <div class="select-options__container">
                
                <div class="select__option">
                  <input type="radio" name="snack" />
                  <label>Pochoclo dulce</label>
                </div>
                <div class="select__option">
                  <input type="radio" name="snack" />
                  <label>Pochoclo salado</label>
                </div>
                <div class="select__option">
                  <input type="radio" name="snack" />
                  <label>Chocolate</label>
                </div>                
                <div class="select__option">
                  <input type="radio" name="snack" />
                  <label>Frutos secos</label>
                </div>                
              </div>
              
            </div>
          </div>
        </div>

        <div class="submit__container">
          <button type="submit" class="button button--primary">Regístrate</button>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <p class="site-footer__text">&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
  </footer>
</body>

</html>
